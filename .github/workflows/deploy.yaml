name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: "true" 
          VITE_SUPABASE_URL: https://bdkaqgvzjkixwakzploq.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify this deployment is latest main
        id: latest-main
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_sha="$(git ls-remote origin refs/heads/main | cut -f1)"
          if [ "$latest_sha" = "$GITHUB_SHA" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping stale Pages deploy for $GITHUB_SHA; latest main is $latest_sha."
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        if: steps.latest-main.outputs.is_latest == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
