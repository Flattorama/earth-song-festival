name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  verify-latest-main:
    runs-on: ubuntu-latest
    outputs:
      is_latest: ${{ steps.latest-main.outputs.is_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify this deployment is latest main
        id: latest-main
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest_sha="$(git ls-remote origin refs/heads/main | cut -f1)"
          if [ "$latest_sha" = "$GITHUB_SHA" ]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping stale deploy for $GITHUB_SHA; latest main is $latest_sha."
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    needs: verify-latest-main
    if: needs.verify-latest-main.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Link Supabase project
        run: npx supabase@latest link --project-ref bdkaqgvzjkixwakzploq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply Supabase migrations
        run: npx supabase@latest db push --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Supabase Edge Functions
        run: |
          npx supabase@latest functions deploy create-checkout --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy get-purchase --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy submit-attendees --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy get-attendee-by-token --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy sign-waiver --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy get-admin-dashboard-data --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy google-sheets-sync --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy stripe-webhook --project-ref bdkaqgvzjkixwakzploq --no-verify-jwt
          npx supabase@latest functions deploy stripe-checkout --project-ref bdkaqgvzjkixwakzploq
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  build:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: "true" 
          VITE_SUPABASE_URL: https://bdkaqgvzjkixwakzploq.supabase.co
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs:
      - verify-latest-main
      - build
    if: needs.verify-latest-main.outputs.is_latest == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
